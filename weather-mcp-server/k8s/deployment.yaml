apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-mcp-server
  labels:
    app: weather-mcp-server
    component: mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-mcp-server
  template:
    metadata:
      labels:
        app: weather-mcp-server
        component: mcp-server
    spec:
      containers:
      - name: weather-mcp
        image: 520817024429.dkr.ecr.us-east-1.amazonaws.com/weather-mcp-server:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: HOST
          value: "0.0.0.0"
        - name: NOMINATIM_USER_AGENT
          value: "summitassistant-weather-mcp"
        - name: REQUEST_TIMEOUT
          value: "10"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
