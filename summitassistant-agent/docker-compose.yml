version: '3.8'

services:
  # SummitAssistant Agent - Main application
  SummitAssistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: SummitAssistant
    ports:
      - "8080:8080"
    environment:
      # AWS Bedrock Configuration
      BEDROCK_MODEL: us.anthropic.claude-sonnet-4-20250514-v1:0
      AWS_REGION: us-east-1
      LLM_MAX_TOKENS: 500
      # AWS credentials (use your actual credentials or AWS CLI profile)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      
      # S3 Storage Configuration
      S3_ENDPOINT_URL: http://s3:4566
      S3_BUCKET_NAME: SummitAssistant-demo-bucket
      S3_REGION: us-east-2
      
      # MCP Server Configuration
      MCP_SERVER_URL: http://calendar-mcp-server:8080
      
      # Agent Configuration
      SESSION_TIMEOUT: 3600
      MAX_RETRIES: 3
      RETRY_BASE_DELAY: 1.0
    volumes:
      # Mount source code for hot-reload during development
      - ./src/SummitAssistant:/app/src/SummitAssistant
      - ./tests:/app/tests
      # Mount AWS credentials from host (optional, for local development)
      - ~/.aws:/root/.aws:ro
    depends_on:
      s3:
        condition: service_healthy
      calendar-mcp-server:
        condition: service_healthy
    networks:
      - SummitAssistant-network
    restart: unless-stopped

  # S3-compatible storage using LocalStack
  s3:
    image: localstack/localstack:latest
    container_name: s3-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      SERVICES: s3
      DEBUG: 0
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - SummitAssistant-network
    restart: unless-stopped

  # Calendar MCP Server
  calendar-mcp-server:
    build:
      context: ../calendar-mcp-server
      dockerfile: Dockerfile
    container_name: calendar-mcp-server
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      HOST: 0.0.0.0
    networks:
      - SummitAssistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Chat UI
  chat-ui:
    build:
      context: ../chat-ui
      dockerfile: Dockerfile
    container_name: chat-ui
    ports:
      - "3000:80"
    networks:
      - SummitAssistant-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  SummitAssistant-network:
    driver: bridge

volumes:
  localstack-data:
    driver: local
