apiVersion: v1
kind: ConfigMap
metadata:
  name: summitassistant-config
  labels:
    app: summitassistant
data:
  # AWS Bedrock Configuration
  BEDROCK_MODEL: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  AWS_REGION: "us-east-1"
  LLM_MAX_TOKENS: "500"
  
  # S3 Storage Configuration
  S3_BUCKET_NAME: "summitassistant-demo-bucket"
  S3_REGION: "us-east-2"
  
  # MCP Server Configuration
  MCP_SERVER_URL: "http://calendar-mcp-server:8080"
  
  # Weather Agent Configuration (for agent-to-agent communication)
  WEATHER_AGENT_URL: "http://strands-weather-agent/agent"
  
  # Agent Configuration
  SESSION_TIMEOUT: "3600"
  MAX_RETRIES: "3"
  RETRY_BASE_DELAY: "1.0"
