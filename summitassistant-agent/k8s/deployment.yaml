apiVersion: apps/v1
kind: Deployment
metadata:
  name: summitassistant
  labels:
    app: summitassistant
    component: agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: summitassistant
      component: agent
  template:
    metadata:
      labels:
        app: summitassistant
        component: agent
    spec:
      serviceAccountName: model-storage-sa
      containers:
      - name: summitassistant
        image: 520817024429.dkr.ecr.us-east-1.amazonaws.com/summitassistant:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: summitassistant-config
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
