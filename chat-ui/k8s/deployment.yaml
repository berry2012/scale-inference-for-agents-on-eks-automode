apiVersion: apps/v1
kind: Deployment
metadata:
  name: summitassistant-chat-ui
  labels:
    app: summitassistant-chat-ui
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: summitassistant-chat-ui
  template:
    metadata:
      labels:
        app: summitassistant-chat-ui
        component: frontend
    spec:
      containers:
      - name: chat-ui
        image: 520817024429.dkr.ecr.us-east-1.amazonaws.com/summitassistant-chat-ui:latest
        ports:
        - containerPort: 8501
          name: http
          protocol: TCP
        env:
        - name: API_URL
          value: "http://summitassistant:8080"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
