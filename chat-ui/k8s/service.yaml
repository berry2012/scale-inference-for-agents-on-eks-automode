---
apiVersion: v1
kind: Service
metadata:
  name: summitassistant-chat-ui
  labels:
    app: summitassistant-chat-ui
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: summitassistant-chat-ui
  ports:
  - port: 80
    targetPort: 8501
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  labels:
    app.kubernetes.io/name: LoadBalancerController
  name: alb
spec:
  controller: eks.amazonaws.com/alb
---  
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: summitassistant-chat-ui
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /_stcore/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '10'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '9'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '10'
    alb.ingress.kubernetes.io/success-codes: '200-302'
    alb.ingress.kubernetes.io/load-balancer-name: summitassistant-chat-ui
    alb.ingress.kubernetes.io/inbound-cidrs: 109.79.140.33/32
    # # Authentication
    # alb.ingress.kubernetes.io/auth-type: cognito
    # alb.ingress.kubernetes.io/auth-scope: openid
    # alb.ingress.kubernetes.io/auth-session-timeout: '3600'
    # alb.ingress.kubernetes.io/auth-session-cookie: AWSELBAuthSessionCookie
    # alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate    
    # alb.ingress.kubernetes.io/auth-idp-cognito: '{"UserPoolArn": "arn:aws:cognito-idp:us-east-2:520817024429:userpool/us-east-2_1kUow7rAJ","UserPoolClientId":"16btkr66s271chgck8qrtmqpjl","UserPoolDomain":"summitassistant"}'
    ## SSL Settings
    external-dns.alpha.kubernetes.io/hostname: summitassistant.eoalola.people.aws.dev 
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:520817024429:certificate/f25663a3-9020-4321-8d24-c3035df5ccca
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06 
  labels:
    app: summitassistant-chat-ui
spec:
  ingressClassName: alb
  rules:
  - host: summitassistant.eoalola.people.aws.dev  
    http:
      paths:
      - backend:
          service:
            name: summitassistant-chat-ui
            port:
              number: 80
        path: /*
        pathType: ImplementationSpecific
  - http:
      paths:
      - backend:
          service:
            name: summitassistant-chat-ui
            port:
              number: 80
        path: /*
        pathType: ImplementationSpecific                  
