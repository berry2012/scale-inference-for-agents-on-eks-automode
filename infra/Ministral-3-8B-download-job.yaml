apiVersion: v1
kind: PersistentVolume
metadata:
  name: mistral-model-pv
spec:
  capacity:
    storage: 1200Gi # Ignored by S3, but required by K8s
  accessModes:
    - ReadWriteMany
  mountOptions:
    - allow-delete
    - allow-overwrite
    - allow-other
    - region us-east-1
  csi:
    driver: s3.csi.aws.com
    volumeHandle: mistral-model-pvc
    volumeAttributes:
      bucketName: kaiml-llm-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mistral-model-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 1200Gi
  volumeName: mistral-model-pv
---
apiVersion: batch/v1
kind: Job
metadata:
  name: download-ministral-3-8b-instruct-2512
  labels:
    app: model-downloader
    model: Ministral-3-8B-Instruct-2512
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 3600
  template:
    metadata:
      labels:
        app: model-downloader
        model: Ministral-3-8B-Instruct-2512
    spec:
      restartPolicy: Never
      serviceAccountName: model-download-sa
      containers:
      - name: model-downloader
        image: python:3.11-slim
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          echo "Installing required packages..."
          pip install --no-cache-dir huggingface_hub

          echo "Starting download of Ministral-3-8B-Instruct-2512..."
          python3 -c "
          from huggingface_hub import snapshot_download
          import shutil, os

          model_name = 'mistralai/Ministral-3-8B-Instruct-2512'
          staging_dir = '/tmp/model-staging'
          s3_dir = '/models/Ministral-3-8B-Instruct-2512'

          print(f'Downloading {model_name} to local staging...')

          snapshot_download(
              repo_id=model_name,
              local_dir=staging_dir,
          )

          print('Download complete. Copying to S3 mount...')
          os.makedirs(s3_dir, exist_ok=True)
          for root, dirs, files in os.walk(staging_dir):
              for f in files:
                  if f.startswith('.') or '/.' in root:
                      continue
                  src = os.path.join(root, f)
                  dst = os.path.join(s3_dir, os.path.relpath(src, staging_dir))
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copyfile(src, dst)
                  print(f'  Copied {dst} ({os.path.getsize(dst):,} bytes)')

          print('All files copied to S3 successfully!')
          "
        resources:
          requests:
            memory: "4Gi"
            cpu: "1"
            ephemeral-storage: "50Gi"
          limits:
            memory: "8Gi"
            cpu: "2"
            ephemeral-storage: "50Gi"
        volumeMounts:
        - name: s3-model-storage
          mountPath: /models
        env:
        - name: HF_HOME
          value: "/tmp/huggingface"
        - name: TRANSFORMERS_CACHE
          value: "/tmp/transformers"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token-secret
              key: token
      volumes:
      - name: s3-model-storage
        persistentVolumeClaim:
          claimName: mistral-model-pvc
